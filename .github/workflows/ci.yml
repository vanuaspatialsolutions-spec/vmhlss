name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # JOB 1: Backend tests (Python / FastAPI / PostGIS)
  # ============================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: test_vmhlss
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies (GDAL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gdal-bin libgdal-dev libproj-dev tesseract-ocr

      - name: Install Python dependencies
        run: |
          cd backend
          pip install --upgrade pip
          # Install a minimal subset that doesn't require GDAL native headers in CI
          pip install \
            fastapi uvicorn sqlalchemy alembic psycopg2-binary \
            python-jose passlib python-multipart python-dotenv \
            celery redis anthropic pydantic pydantic-settings \
            shapely pyproj numpy scipy \
            reportlab folium httpx \
            pytest pytest-asyncio pytest-cov

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_vmhlss" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=test_key_placeholder" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=test_secret_key_minimum_32_characters_long" >> $GITHUB_ENV
          echo "UPLOAD_DIR=/tmp/vmhlss_uploads" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          cd backend
          alembic upgrade head
        continue-on-error: true

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=xml || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ============================================================
  # JOB 2: Frontend build & type-check (React / TypeScript)
  # ============================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: TypeScript type-check
        run: |
          cd frontend
          node_modules/.bin/tsc --noEmit

      - name: Production build
        run: |
          cd frontend
          npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # JOB 3: Security scan (Trivy filesystem scan)
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
