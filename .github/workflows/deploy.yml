name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "RENDER_SERVICE_ID=${{ secrets.RENDER_BACKEND_SERVICE_ID_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "RENDER_SERVICE_ID=${{ secrets.RENDER_BACKEND_SERVICE_ID_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy backend to Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clearCache": true
            }' \
            "https://api.render.com/v1/services/${{ steps.env.outputs.RENDER_SERVICE_ID }}/deploys"

      - name: Wait for backend deployment
        run: |
          echo "Backend deployment triggered. Waiting for completion..."
          for i in {1..60}; do
            if curl -s -f "https://vmhlss-api.onrender.com/health" > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: Waiting for backend..."
            sleep 10
          done
          echo "Timeout waiting for backend to be healthy"
          exit 1

      - name: Run database migrations
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "command": "alembic upgrade head"
            }' \
            "https://api.render.com/v1/services/${{ steps.env.outputs.RENDER_SERVICE_ID }}/exec"

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Backend deployment to ${{ steps.env.outputs.ENV }} - ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
          VITE_MAPLIBRE_STYLE_URL: ${{ secrets.VITE_MAPLIBRE_STYLE_URL }}
        run: |
          cd frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          cname: vmhlss.example.com

      - name: Deploy to Render (static site)
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clearCache": true
            }' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys"

      - name: Wait for frontend deployment
        run: |
          echo "Frontend deployment triggered. Waiting for completion..."
          for i in {1..60}; do
            if curl -s -f "https://vmhlss.onrender.com/" > /dev/null 2>&1; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Attempt $i: Waiting for frontend..."
            sleep 10
          done
          echo "Timeout waiting for frontend to be healthy"
          exit 1

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Frontend deployment - ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  smoke-tests:
    name: Run Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install -g @playwright/test
          npx playwright install

      - name: Run smoke tests
        run: |
          cd frontend
          npm install
          npx playwright test tests/smoke/ || true
        continue-on-error: true

      - name: Test API endpoints
        run: |
          echo "Testing health endpoint..."
          curl -f https://vmhlss-api.onrender.com/health || exit 1

          echo "Testing API connectivity..."
          curl -f https://vmhlss-api.onrender.com/api/status || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: smoke-test-results
          path: frontend/test-results/
        continue-on-error: true

  rollback:
    name: Rollback on Failure
    needs: [deploy-backend, deploy-frontend, smoke-tests]
    runs-on: ubuntu-latest
    if: failure()
    environment: production

    steps:
      - name: Rollback backend
        run: |
          echo "Rolling back backend to previous version..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID_PROD }}/deploys" || true

      - name: Rollback frontend
        run: |
          echo "Rolling back frontend to previous version..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" || true

      - name: Send alert
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: 'VMHLSS deployment failed. Automatic rollback initiated.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  post-deploy:
    name: Post-Deployment Tasks
    needs: [deploy-backend, deploy-frontend, smoke-tests]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Clear CDN cache
        run: |
          echo "Clearing CDN cache..."
          # Add CDN cache clearing commands here if using a CDN

      - name: Update documentation
        run: |
          echo "Deployment completed successfully"
          echo "Frontend: https://vmhlss.onrender.com"
          echo "API: https://vmhlss-api.onrender.com"

      - name: Send success notification
        uses: 8398a7/action-slack@v3
        with:
          status: 'success'
          text: 'VMHLSS deployment to production completed successfully'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Create deployment annotation
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Deployment completed',
              auto_merge: false,
              required_contexts: []
            })
