name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ============================================================
  # JOB 1: Deploy Frontend to GitHub Pages
  # ============================================================
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest

    # Required so peaceiris/actions-gh-pages can push to gh-pages
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://vmhlss-api.onrender.com/api' }}
          VITE_MAPLIBRE_STYLE_URL: ${{ secrets.VITE_MAPLIBRE_STYLE_URL || '' }}
        run: |
          cd frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'

  # ============================================================
  # JOB 2: Deploy Backend to Render
  # Skipped if RENDER_API_KEY secret is not set.
  # ============================================================
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "RENDER_API_KEY not set — skipping Render deploy"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"
          echo "Render deploy triggered."

      - name: Wait for backend health
        run: |
          API_URL="${{ secrets.VITE_API_URL || 'https://vmhlss-api.onrender.com' }}"
          for i in {1..30}; do
            if curl -s -f "${API_URL%/api}/health" > /dev/null 2>&1; then
              echo "✓ Backend healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/30: waiting…"
            sleep 10
          done
          echo "⚠ Backend health check timed out (may still be starting)"
          exit 0
