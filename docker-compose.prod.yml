version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: vmhlss
      POSTGRES_USER: vmhlss_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=100"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmhlss_user -d vmhlss"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vmhlss-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vmhlss-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend:
    image: vmhlss-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://vmhlss_user:${DB_PASSWORD}@db:5432/vmhlss
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: production
      MAX_UPLOAD_SIZE_MB: 500
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: info
      WORKERS: 4
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - vmhlss-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --access-logfile - --error-logfile - --log-level info

  celery:
    image: vmhlss-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://vmhlss_user:${DB_PASSWORD}@db:5432/vmhlss
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: production
    volumes:
      - uploads:/app/uploads
    networks:
      - vmhlss-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  celery-beat:
    image: vmhlss-backend:latest
    command: celery -A app.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://vmhlss_user:${DB_PASSWORD}@db:5432/vmhlss
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: production
    networks:
      - vmhlss-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    image: vmhlss-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_MAPLIBRE_STYLE_URL: ${MAPLIBRE_STYLE_URL}
      VITE_ENVIRONMENT: production
    networks:
      - vmhlss-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    environment:
      UPSTREAM_BACKEND: backend:8000
      UPSTREAM_FRONTEND: frontend:3000
      UPSTREAM_TILES: tileserv:7800
    networks:
      - vmhlss-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  tileserv:
    image: pramsey/pg_tileserv:latest
    environment:
      DATABASE_URL: postgresql://vmhlss_user:${DB_PASSWORD}@db:5432/vmhlss
      TS_LOGLEVEL: info
      TS_PORT: 7800
      TS_SERVERNAME: ${DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vmhlss-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  uploads:
  nginx_cache:

networks:
  vmhlss-network:
    driver: bridge
