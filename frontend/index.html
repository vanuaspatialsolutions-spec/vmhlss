<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vmhlss/vss-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VMHLSS - Vanuatu Multi-Hazard Land Suitability System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // GitHub Pages SPA: restore path from 404.html redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(
            null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') +
            '/' + decodeURIComponent(p[1]) +
            (window.location.search.match(/[?&]h=([^&]*)/) ?
              '#' + decodeURIComponent(window.location.search.match(/[?&]h=([^&]*)/)[1]) : '')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
