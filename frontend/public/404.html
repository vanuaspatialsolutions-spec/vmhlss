<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VMHLSS</title>
  <script>
    // GitHub Pages SPA redirect trick
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
    );
  </script>
</head>
<body></body>
</html>
