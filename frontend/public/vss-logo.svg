<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Deep ocean-to-land gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d62;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#1a6b3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    <!-- Globe grid stroke -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <!-- Text glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>

  <!-- Globe grid lines clipped to circle -->
  <g clip-path="url(#circle-clip)" stroke="url(#gridGrad)" fill="none" stroke-width="0.8">
    <!-- Latitude lines -->
    <ellipse cx="100" cy="100" rx="90" ry="25"/>
    <ellipse cx="100" cy="100" rx="90" ry="55"/>
    <ellipse cx="100" cy="100" rx="90" ry="78"/>
    <!-- Longitude curves -->
    <path d="M100 10 Q130 55 100 100 Q70 145 100 190" />
    <path d="M100 10 Q158 55 148 100 Q138 145 100 190" />
    <path d="M100 10 Q42 55 52 100 Q62 145 100 190" />
    <line x1="10" y1="100" x2="190" y2="100"/>
  </g>

  <!-- Location pin / spatial marker -->
  <g transform="translate(100, 52)">
    <path d="M0,-18 C-10,-18 -18,-10 -18,0 C-18,12 0,30 0,30 C0,30 18,12 18,0 C18,-10 10,-18 0,-18 Z"
          fill="#f9ca24" opacity="0.95"/>
    <circle cx="0" cy="0" r="7" fill="#0a3d62"/>
    <!-- Cross-hair inside pin -->
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#f9ca24" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#f9ca24" stroke-width="1.5"/>
  </g>

  <!-- VSS Text -->
  <text x="100" y="130"
        font-family="'Arial Black', 'Arial Bold', sans-serif"
        font-size="36"
        font-weight="900"
        text-anchor="middle"
        fill="#ffffff"
        filter="url(#glow)"
        letter-spacing="3">VSS</text>

  <!-- Tagline -->
  <text x="100" y="152"
        font-family="Arial, sans-serif"
        font-size="7.5"
        font-weight="400"
        text-anchor="middle"
        fill="#a8e6cf"
        letter-spacing="1.5">VANUA SPATIAL SOLUTIONS</text>

  <!-- Bottom accent line -->
  <line x1="60" y1="162" x2="140" y2="162" stroke="#2ecc71" stroke-width="1" opacity="0.7"/>
</svg>
